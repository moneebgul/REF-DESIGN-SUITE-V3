name: Build RefDesign APK

# Builds a real, installable APK in the cloud — no local Android Studio needed.
# GitHub's runners already have the Android SDK + Gradle.
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # lets you trigger it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: npm install

      - name: Sync web assets into the native project
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: refdesign-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
